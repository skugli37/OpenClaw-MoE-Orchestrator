name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  secret-and-dependency-audit:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tooling
        run: python -m pip install --upgrade pip detect-secrets==1.5.0 pip-audit==2.9.0  # pragma: allowlist secret

      - name: Run secret scan
        run: |
          git ls-files -z | xargs -0 detect-secrets-hook --exclude-files 'skills/openclaw-moe-orchestrator/templates/auth-profiles.json'  # pragma: allowlist secret

      - name: Audit production dependencies
        run: |
          tmp_requirements="$(mktemp)"
          python - <<'PY' "$tmp_requirements"
          import sys
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          deps = data["project"]["dependencies"]
          Path(sys.argv[1]).write_text(chr(10).join(deps) + chr(10))
          PY
          pip-audit -r "$tmp_requirements"
          rm -f "$tmp_requirements"
