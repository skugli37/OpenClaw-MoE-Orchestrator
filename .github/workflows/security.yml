name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  secret-and-dependency-audit:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/production.lock

      - name: Install security tooling
        run: python -m pip install --upgrade pip detect-secrets==1.5.0 pip-audit==2.9.0  # pragma: allowlist secret

      - name: Run secret scan
        run: |
          git ls-files -z | xargs -0 detect-secrets-hook --exclude-files 'skills/openclaw-moe-orchestrator/templates/auth-profiles.json'  # pragma: allowlist secret

      - name: Audit production dependencies
        run: pip-audit -r requirements/production.lock
